baseURL = 'https://glitchmahotsukai.netlify.app/'
title = '故障魔法使'

# 多语言配置
defaultContentLanguage = 'zh'
[languages]
  [languages.zh]
    title = '故障魔法使'
    weight = 1
    contentDir = 'content/zh'
    languageName = '中文'
  [languages.en]
    title = 'Glitch Mahotsukai'
    weight = 2
    contentDir = 'content/en'
    languageName = 'English'

# 多媒体相关配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 输出配置
[outputs]
  home = ["HTML", "RSS"]

# 确保静态文件正确复制
[build]
  writeStats = true

# 禁用不必要的 Kind
disableKinds = ["taxonomy", "term"]
