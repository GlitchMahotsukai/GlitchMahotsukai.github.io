<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
            "http://www.w3.org/TR/html4/strict.dtd">
<head>
<title>{{ .Title }} - {{ .Site.Title }}</title>
<meta http-equiv="Content-type" content="text/html;charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style type="text/css">
BODY {max-width: 95ch; margin: auto; padding: 0.5em;}
.heading { text-align: center; }
.small  { font-size: 90%;}
dd { margin: 2px 0 1em; }
.meta { font-size: 90%; color: #666; margin-bottom: 1em; }
a, a:link, a:visited, a:hover, a:active { color: #0000cc; text-decoration: underline; }
a.clicked-temp { color: #660099 !important; text-decoration: underline; }
</style>
</head>
<body>

<p class="lang-nav" style="text-align: right;">
<a href="/zh/">中文</a>
|
<a href="/en/">English</a>
</p>

<h1 class="heading">{{ .Title }}</h1>

<p class="meta">{{ .Date.Format "2006-01-02" }} | {{ .Params.author | default "Admin" }}</p>

{{ .Content }}

<p><a href="{{ .Site.BaseURL }}{{ .Site.Language.Lang }}/">← Back to index</a></p>

<p class="heading"><small>Powered by hugo</small></p>
<script type="text/javascript">
document.addEventListener("DOMContentLoaded", function () {
  var links = document.querySelectorAll("a");
  for (var i = 0; i < links.length; i++) {
    links[i].addEventListener("click", function () {
      this.classList.add("clicked-temp");
    });
  }
});
</script>
</body>
</html>
