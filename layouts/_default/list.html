<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN"
            "http://www.w3.org/TR/html4/strict.dtd">
<head>
<title>{{ .Title }} - {{ .Site.Title }}</title>
<meta http-equiv="Content-type" content="text/html;charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style type="text/css">
BODY {max-width: 95ch; margin: auto; padding: 0.5em;}
.heading { text-align: center; }
.small  { font-size: 90%;}
dd { margin: 2px 0 1em; }
</style>
</head>
<body>

<p style="text-align: right;">
<a href="{{ .Site.BaseURL }}zh/">中文</a>
|
<a href="{{ .Site.BaseURL }}en/">English</a>
</p>

<h1 class="heading">{{ .Title }}</h1>

<dl>
{{ range .Pages }}
<dt><strong><a href="{{ .RelPermalink }}">{{ .Title }}</a></strong></dt>
<dd class="small">{{ .Date.Format "2006-01-02" }}</dd>
{{ end }}
</dl>

<p><a href="{{ .Site.BaseURL }}{{ .Site.Language.Lang }}/">← Back to index</a></p>

<p class="heading"><small>Powered by Hugo</small></p>

</body>
</html>
