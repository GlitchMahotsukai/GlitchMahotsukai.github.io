<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    body {
      font-family: monospace;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fff;
      color: #333;
      line-height: 1.8;
    }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.5em; margin-bottom: 20px; }
    h2 { font-size: 1.2em; margin-top: 30px; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
    ul { list-style: none; padding-left: 20px; }
    li { margin: 8px 0; }
    .post-date { color: #666; font-size: 0.9em; }
    .media-link { color: #008800; }
    .lang-switch { margin-bottom: 20px; padding: 10px 0; border-bottom: 1px solid #eee; }
    .lang-switch a { margin-right: 10px; padding: 5px 10px; background: #f0f0f0; border-radius: 3px; }
    .back { margin-top: 40px; }
  </style>
</head>
<body>
  <div class="lang-switch">
    {{ range .Site.Languages }}
      <a href="/{{ .Lang }}/">{{ .LanguageName }}</a>
    {{ end }}
  </div>

  <h1>{{ .Title }}</h1>

  <ul>
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span class="post-date">({{ .Date.Format "2006-01-02" }})</span>
        {{ if .Params.image }}
          <span class="media-link"> [📷]</span>
        {{ end }}
      </li>
    {{ end }}
  </ul>

  <div class="back">
    <a href="/">← 返回首页</a>
  </div>
</body>
</html>
