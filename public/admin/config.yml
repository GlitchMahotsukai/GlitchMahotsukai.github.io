backend:
  name: git-gateway
  branch: master

media_folder: "static/images"
public_folder: "/images"

locale: "zh"

# 关键：告诉 Decap CMS 配置文件的位置
site_url: https://glitchmahotsukai.netlify.app/
display_url: https://glitchmahotsukai.netlify.app/

# 日志级别
log_level: debug

collections:
  - name: "posts"
    label: "博客文章"
    folder: "content/zh/posts"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "作者", name: "author", widget: "string", default: "管理员" }
      - { label: "标签", name: "tags", widget: "list", default: ["博客"] }
      - { label: "封面图片", name: "image", widget: "image", required: false }
      - { label: "正文", name: "body", widget: "markdown", required: false }

  - name: "posts-en"
    label: "Blog Posts (English)"
    folder: "content/en/posts"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Author", name: "author", widget: "string", default: "Admin" }
      - { label: "Tags", name: "tags", widget: "list", default: ["blog"] }
      - { label: "Featured Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "pages"
    label: "页面"
    folder: "content/zh/pages"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "正文", name: "body", widget: "markdown" }
